<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>avg mark Condition</title>
</head>

<body>
    <script>
        let marks = [60, 70, 80, 90, 100];
        let total = 0;
        for (let i = 0; i < marks.length; i++) {
            total += marks[i];
        }
        let avgMarks = total / marks.length;
        if (avgMarks >= 90) {
            console.log("Grade A");
        }
        else if (avgMarks >= 80 && avgMarks < 90) {
            console.log("Grade B");
        }
        else if (avgMarks >= 70 && avgMarks < 80) {
            console.log("Grade C");
        }
        else if (avgMarks >= 60 && avgMarks < 70) {
            console.log("Grade D");
        }
        else {
            console.log("Grade F");
        }

    </script>
</body>

</html>
