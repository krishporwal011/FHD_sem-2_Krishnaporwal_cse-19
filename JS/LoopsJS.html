<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in Js</title>
</head>

<body>
    <script>
        //loops used to repeatedly run a block of code until a specific condition is met.

        //for loop:Used when you know the number of iterations in advance
        let studentList = ["abhi", "uday", "abhyudai", "abhay", "anuj", "megha"];
        for (let i = 0; i < studentList.length; i++) {
            console.log(studentList[i]);
        }
        //while loop
        let x = 0;
        while (x < studentList.length) {
            console.log(studentList[x]);
            x++;
        }
        //for .........of :iterates over the values of iterate objects (like arrays,strings,maps and sets)
        for(let y of studentList){
            console.log(y);
        }

    </script>
</body>

</html>
